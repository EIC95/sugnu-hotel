<div class="min-h-screen flex flex-col bg-gray-50">
  <app-navbar></app-navbar>
  <main class="grow flex items-center justify-center px-4 py-12">
    <div class="max-w-md w-full bg-white p-12 rounded-2xl shadow-xl">
      <h2 class="text-3xl font-bold text-green-900 mb-8 text-center">Inscription</h2>
      <form (ngSubmit)="register()" #registerForm="ngForm" class="space-y-4">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Nom complet</label>
          <input type="text" [(ngModel)]="userData.name" name="name" required 
                 class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-green-700 focus:ring-2 focus:ring-green-700/20">
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Email</label>
          <input type="email" [(ngModel)]="userData.email" name="email" required 
                 class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-green-700 focus:ring-2 focus:ring-green-700/20">
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Téléphone</label>
          <input type="text" [(ngModel)]="userData.phone" name="phone" 
                 class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-green-700 focus:ring-2 focus:ring-green-700/20">
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Mot de passe</label>
          <input type="password" [(ngModel)]="userData.password" name="password" required 
                 class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-green-700 focus:ring-2 focus:ring-green-700/20">
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Confirmer le mot de passe</label>
          <input type="password" [(ngModel)]="userData.password_confirmation" name="password_confirmation" required 
                 class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-green-700 focus:ring-2 focus:ring-green-700/20">
        </div>
        <div *ngIf="error" class="p-3 bg-red-100 text-red-700 rounded-lg text-sm">{{ error }}</div>
        <button type="submit" [disabled]="!registerForm.form.valid" 
                class="cursor-pointer w-full bg-green-800 text-white py-3 rounded-lg font-bold hover:bg-green-900 transition duration-300">
          S'inscrire
        </button>
      </form>
      <p class="mt-6 text-center text-gray-600">
        Déjà un compte ? 
        <a routerLink="/login" class="text-orange-500 font-bold hover:underline">Se connecter</a>
      </p>
    </div>
  </main>
  <app-footer></app-footer>
</div>
