<div class="min-h-screen flex flex-col bg-stone-50">
  <app-navbar></app-navbar>
  <main class="grow flex items-center justify-center px-4">
    <div class="max-w-md w-full bg-white p-12 rounded-sm border border-stone-200 shadow-sm">
      <h2 class="text-3xl font-bold text-stone-900 mb-8 text-center">Connexion</h2>
      <form (ngSubmit)="login()" #loginForm="ngForm" class="space-y-6">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Email</label>
          <input type="email" [(ngModel)]="credentials.email" name="email" required 
                 class="w-full border border-gray-300 rounded-sm px-3 py-2.5 text-sm focus:outline-none focus:border-stone-700 focus:ring-2 focus:ring-stone-700/20">
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Mot de passe</label>
          <input type="password" [(ngModel)]="credentials.password" name="password" required 
                 class="w-full border border-gray-300 rounded-sm px-3 py-2.5 text-sm focus:outline-none focus:border-stone-700 focus:ring-2 focus:ring-stone-700/20">
        </div>
        <div *ngIf="error" class="p-3 bg-red-100 text-red-700 rounded-sm text-sm">{{ error }}</div>
        <button type="submit" [disabled]="!loginForm.form.valid" 
                class="cursor-pointer w-full bg-stone-800 text-white py-3 rounded-sm font-bold hover:bg-stone-900 transition duration-300">
          Se connecter
        </button>
      </form>
      <p class="mt-6 text-center text-gray-600">
        Pas encore de compte ? 
        <a routerLink="/register" class="text-[#C1A87D] font-bold hover:underline">S'inscrire</a>
      </p>
    </div>
  </main>
  <app-footer></app-footer>
</div>
