<div class="min-h-screen flex flex-col">
  <app-navbar></app-navbar>

  <main class="grow bg-gray-50 py-12">
    <div class="max-w-7xl mx-auto px-4">
      <h1 class="text-4xl font-bold text-green-900 mb-8">Nos Chambres Disponibles</h1>

      <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
        <div class="md:col-span-3">
          <div *ngIf="loading" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div *ngFor="let i of [1,2,3,4]" class="h-80 bg-white animate-pulse rounded-xl shadow-md"></div>
          </div>

          <div *ngIf="!loading && rooms.length > 0" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <app-room-card *ngFor="let room of rooms" [room]="room"></app-room-card>
          </div>

          <div *ngIf="!loading && rooms.length === 0" class="bg-white p-12 rounded-xl text-center shadow-lg border border-gray-100">
            <p class="text-gray-500 text-lg italic">Aucune chambre ne correspond à vos critères.</p>
            <button (click)="resetFilters()" class="cursor-pointer mt-4 text-green-800 font-bold hover:underline">Réinitialiser les filtres</button>
          </div>
        </div>

        <div class="md:col-span-1">
          <div class="bg-white p-6 rounded-xl shadow-lg sticky top-8 border border-gray-100">
            <h2 class="text-xl font-bold text-green-800 mb-4 flex items-center">
              <span class="mr-2">🔍</span> Filtrer
            </h2>
            <div class="space-y-4">
              <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Arrivée</label>
                <input type="date" [(ngModel)]="filters.check_in_date"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-green-700 focus:ring-2 focus:ring-green-700/20">
              </div>
              <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Départ</label>
                <input type="date" [(ngModel)]="filters.check_out_date"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-green-700 focus:ring-2 focus:ring-green-700/20">
              </div>
              <div>
                <button (click)="loadRooms()" 
                        class="cursor-pointer w-full bg-green-800 text-white py-2.5 rounded-lg font-bold hover:bg-green-900 transition duration-300 shadow-md">
                  Appliquer
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <app-footer></app-footer>
</div>
