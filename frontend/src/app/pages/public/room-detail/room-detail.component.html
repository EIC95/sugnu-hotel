<div class="min-h-screen flex flex-col">
  <app-navbar></app-navbar>

  <main class="flex-grow bg-gray-50" *ngIf="room">
    <div class="max-w-7xl mx-auto px-4 py-12">
      <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-0">
          <div class="relative h-96">
            <img [src]="getMainImageUrl()" class="w-full h-full object-cover" [alt]="room.room_type.name">
          </div>
          <div class="p-12">
            <h1 class="text-4xl font-bold text-green-900 mb-4">{{ room.room_type.name }}</h1>
            <p class="text-gray-500 mb-8">{{ room.room_type.description }}</p>
            
            <div class="grid grid-cols-2 gap-6 mb-8">
              <div class="bg-gray-50 p-4 rounded-xl">
                <p class="text-xs text-gray-500 uppercase font-bold mb-1">Prix par nuit</p>
                <p class="text-2xl font-bold text-orange-500">{{ room.price_per_night }}€</p>
              </div>
              <div class="bg-gray-50 p-4 rounded-xl">
                <p class="text-xs text-gray-500 uppercase font-bold mb-1">Capacité</p>
                <p class="text-2xl font-bold text-green-800">{{ room.max_occupancy }} pers.</p>
              </div>
            </div>

            <div class="mb-8">
              <h2 class="text-lg font-bold text-green-900 mb-4">Équipements</h2>
              <ul class="grid grid-cols-2 gap-2">
                <li *ngFor="let amenity of room.amenities" class="flex items-center text-gray-600">
                  <span class="mr-2 text-green-600">✓</span>
                  {{ amenity.amenity_name }}
                </li>
              </ul>
            </div>

            <div class="flex gap-4">
              <a [routerLink]="['/client/booking', room.id]" class="bg-green-800 text-white px-8 py-4 rounded-xl font-bold text-lg hover:bg-green-900 shadow-lg transition duration-300">
                Réserver maintenant
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <app-footer></app-footer>
</div>
