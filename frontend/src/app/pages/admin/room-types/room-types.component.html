<div class="min-h-screen flex flex-col bg-stone-50">
  <app-navbar></app-navbar>

  <main class="grow py-12">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold text-stone-900">Types de Chambres</h1>
        <button (click)="openAdd()" class="cursor-pointer bg-stone-800 text-white px-6 py-2 rounded-sm font-bold hover:bg-stone-900 transition">
          + Nouveau Type
        </button>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <div *ngFor="let type of roomTypes" class="bg-white rounded-sm border border-stone-200 shadow-sm overflow-hidden border border-gray-100 flex flex-col">
          <div class="h-48 relative">
            <img [src]="getRoomTypeImageUrl(type.image)"
                 class="w-full h-full object-cover" alt="">
            <div class="absolute bottom-0 left-0 right-0 p-4 bg-linear-to-t from-black/70 to-transparent text-white">
              <h3 class="font-bold text-xl">{{ type.name }}</h3>
            </div>
          </div>
          <div class="p-6 grow flex flex-col">
            <p class="text-stone-500 text-sm mb-4 line-clamp-3 grow">{{ type.description }}</p>
            <div class="flex justify-between items-center mt-2">
              <div>
                <p class="text-stone-800 font-bold">{{ type.base_price | number }} FCFA / nuit</p>
                <p class="text-xs text-stone-400">Max {{ type.max_occupancy }} pers.</p>
              </div>
              <div class="flex space-x-3">
                <button (click)="editType(type)" class="cursor-pointer text-blue-600 font-bold text-sm hover:underline">Modifier</button>
                <button (click)="deleteType(type.id)" class="cursor-pointer text-red-600 font-bold text-sm hover:underline">Supprimer</button>
              </div>
            </div>
          </div>
        </div>

        <div *ngIf="roomTypes.length === 0" class="col-span-3 py-16 text-center text-stone-400 italic">
          Aucun type de chambre enregistré.
        </div>
      </div>
    </div>
  </main>

  <app-footer></app-footer>

  
  <div *ngIf="showModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 px-4">
    <div class="bg-white rounded-sm border border-stone-200 shadow-sm w-full max-w-lg">
      <div class="flex justify-between items-center px-8 py-5 border-b border-gray-100">
        <h2 class="text-xl font-bold text-stone-900">{{ editMode ? 'Modifier le type' : 'Nouveau type de chambre' }}</h2>
        <button (click)="showModal = false" class="cursor-pointer text-stone-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
      </div>

      <form (ngSubmit)="save()" #rtForm="ngForm" class="px-8 py-6 space-y-4">
        <div>
          <label class="block text-xs font-bold text-stone-500 uppercase mb-1">Nom</label>
          <input type="text" [(ngModel)]="formData.name" name="name" required
                 class="w-full border border-gray-300 rounded-sm px-3 py-2.5 text-sm focus:outline-none focus:border-stone-700 focus:ring-2 focus:ring-stone-700/20">
        </div>
        <div>
          <label class="block text-xs font-bold text-stone-500 uppercase mb-1">Description</label>
          <textarea [(ngModel)]="formData.description" name="description" required rows="3"
                    class="w-full border border-gray-300 rounded-sm px-3 py-2.5 text-sm focus:outline-none focus:border-stone-700 focus:ring-2 focus:ring-stone-700/20"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold text-stone-500 uppercase mb-1">Prix de base (FCFA)</label>
            <input type="number" [(ngModel)]="formData.base_price" name="base_price" min="0" required
                   class="w-full border border-gray-300 rounded-sm px-3 py-2.5 text-sm focus:outline-none focus:border-stone-700 focus:ring-2 focus:ring-stone-700/20">
          </div>
          <div>
            <label class="block text-xs font-bold text-stone-500 uppercase mb-1">Capacité max</label>
            <input type="number" [(ngModel)]="formData.max_occupancy" name="max_occupancy" min="1" required
                   class="w-full border border-gray-300 rounded-sm px-3 py-2.5 text-sm focus:outline-none focus:border-stone-700 focus:ring-2 focus:ring-stone-700/20">
          </div>
        </div>

        <div *ngIf="error" class="p-3 bg-red-50 border border-red-200 text-red-700 rounded-sm text-sm">{{ error }}</div>

        <div class="flex justify-end space-x-3 pt-2">
          <button type="button" (click)="showModal = false"
                  class="cursor-pointer px-5 py-2.5 rounded-sm border border-gray-300 text-gray-600 font-bold hover:bg-stone-50 transition">
            Annuler
          </button>
          <button type="submit" [disabled]="!rtForm.form.valid || saving"
                  class="cursor-pointer px-5 py-2.5 rounded-sm bg-stone-800 text-white font-bold hover:bg-stone-900 transition disabled:opacity-50">
            {{ saving ? 'Enregistrement...' : (editMode ? 'Modifier' : 'Créer') }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
