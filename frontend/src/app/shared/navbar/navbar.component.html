<nav class="bg-stone-800 text-white shadow-sm">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
          <div class="flex items-center">
            <a routerLink="/" class="shrink-0 flex items-center">
              <span class="text-2xl font-bold text-[#d4ba8a]">SugnuHotel</span>
            </a>
            <div *ngIf="!authService.hasRole('admin') && !authService.hasRole('receptionist')"
                 class="hidden sm:ml-6 sm:flex sm:space-x-8">
              <a routerLink="/" class="inline-flex items-center px-1 pt-1 text-sm font-medium hover:text-[#d4ba8a]">Accueil</a>
              <a routerLink="/rooms" class="inline-flex items-center px-1 pt-1 text-sm font-medium hover:text-[#d4ba8a]">Chambres</a>
            </div>
          </div>
          <div class="flex items-center">
            <ng-container *ngIf="authService.currentUser(); else guestLinks">
              <div class="hidden sm:ml-6 sm:flex sm:space-x-4 items-center">
                <span class="text-sm font-medium">Bonjour, {{ authService.currentUser()?.name }}</span>
                
                
                <a *ngIf="authService.hasRole('client')" routerLink="/client/dashboard" class="text-sm font-medium hover:text-[#d4ba8a]">Mon Espace</a>
                
                
                <a *ngIf="authService.hasRole('receptionist')" routerLink="/receptionist/dashboard" class="text-sm font-medium hover:text-[#d4ba8a]">Réception</a>
                
                
                <a *ngIf="authService.hasRole('admin')" routerLink="/admin/dashboard" class="text-sm font-medium hover:text-[#d4ba8a]">Administration</a>
                
                <button (click)="authService.logout()" class="cursor-pointer bg-[#C1A87D] hover:bg-[#b09e80] text-white px-4 py-2 rounded-sm text-sm font-medium transition duration-300">Déconnexion</button>
              </div>
            </ng-container>
            <ng-template #guestLinks>
              <div class="flex space-x-4">
                <a routerLink="/login" class="inline-flex items-center px-4 py-2 text-sm font-medium hover:text-[#d4ba8a]">Connexion</a>
                <a routerLink="/register" class="bg-[#C1A87D] hover:bg-[#b09e80] text-white px-4 py-2 rounded-sm text-sm font-medium transition duration-300">S'inscrire</a>
              </div>
            </ng-template>
          </div>
        </div>
      </div>
    </nav>
